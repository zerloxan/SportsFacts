services:
  postgres:
    image: postgres:16-alpine
    container_name: sportsfacts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sportsfacts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sportsfacts}
      POSTGRES_DB: ${POSTGRES_DB:-sportsfacts}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportsfacts}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sportsfacts-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.18
    container_name: sportsfacts-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode dev-container
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --smp 1
      - --default-log-level=info
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.6
    container_name: sportsfacts-redpanda-console
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: "redpanda:29092"
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

volumes:
  postgres_data:
  redis_data:
